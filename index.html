<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Ikah ❤️</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
margin:0;
overflow:hidden;
font-family:sans-serif;
color:white;
background:black;
}

/* PIN PAGE */

#pinPage{
position:fixed;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:10;
}

.pinBG{
position:absolute;
width:100%;
height:100%;
display:grid;
grid-template-columns:1fr 1fr 1fr;
}

.pinBG img{
width:100%;
height:100%;
object-fit:cover;
}

.pinCard{
position:relative;
background:rgba(0,0,0,0.45);
padding:25px;
border-radius:20px;
backdrop-filter:blur(10px);
text-align:center;
margin-bottom:20px;
}

.pinDisplay{
font-size:32px;
letter-spacing:10px;
}

/* PIN BUTTON */

.keypad{
display:grid;
grid-template-columns:repeat(3,85px);
gap:20px;
z-index:2;
}

.key{
height:75px;
width:75px;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
color:white;

background:rgba(255,255,255,0.15);
border-radius:50%;

backdrop-filter:blur(8px);
box-shadow:
0 6px 15px rgba(0,0,0,0.5),
inset 0 0 10px rgba(255,255,255,0.4);

position:relative;
}

.key:before{
content:"❤";
position:absolute;
font-size:34px;
opacity:.25;
}

.key span{
position:relative;
z-index:2;
}

/* HEART TAP */

.heart{
position:absolute;
font-size:18px;
animation:heartFly 1.6s forwards;
pointer-events:none;
}

@keyframes heartFly{
0%{transform:translateY(0) scale(1);opacity:1;}
100%{transform:translateY(-180px) scale(1.6);opacity:0;}
}

/* FALL HEART */

.fallHeart{
position:absolute;
font-size:16px;
animation:fall linear infinite;
opacity:.6;
}

@keyframes fall{
0%{transform:translateY(-10vh);}
100%{transform:translateY(110vh);}
}

/* STAR */

.star{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:.2;}
to{opacity:1;}
}

/* SLIDER */

#slider{
position:absolute;
width:300%;
height:100vh;
display:flex;
transition:transform .9s cubic-bezier(.77,0,.18,1);
}

.page{
width:100vw;
height:100vh;
background-size:cover;
background-position:center;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:40px;
position:relative;
}

/* CARD */

.card{
background:rgba(0,0,0,0.45);
padding:30px;
border-radius:20px;
backdrop-filter:blur(6px);
max-width:500px;
text-align:center;
font-size:20px;
}

/* BIRTHDAY */

#birthday{
font-size:42px;
font-weight:bold;
text-shadow:0 0 20px pink,0 0 40px hotpink;
margin-bottom:20px;
opacity:0;
transition:opacity 2s;
}

canvas{
position:absolute;
top:0;
left:0;
pointer-events:none;
}

</style>
</head>

<body>

<div id="stars"></div>
<div id="fallHearts"></div>

<!-- AUDIO -->

<audio id="music" loop>
<source src="risk-it-all.mp3">
</audio>

<!-- PIN PAGE -->

<div id="pinPage">

<div class="pinBG">
<img src="zfoto1.jpeg">
<img src="zfoto2.jpeg">
<img src="zfoto3.jpeg">
</div>

<div class="pinCard">
<h2>🔐 Secret Code</h2>
<p>Clue: tanggal pertama kita bertemu ❤️</p>
<div id="display" class="pinDisplay">______</div>
</div>

<div class="keypad">

<div class="key" onclick="press(1)"><span>1</span></div>
<div class="key" onclick="press(2)"><span>2</span></div>
<div class="key" onclick="press(3)"><span>3</span></div>

<div class="key" onclick="press(4)"><span>4</span></div>
<div class="key" onclick="press(5)"><span>5</span></div>
<div class="key" onclick="press(6)"><span>6</span></div>

<div class="key" onclick="press(7)"><span>7</span></div>
<div class="key" onclick="press(8)"><span>8</span></div>
<div class="key" onclick="press(9)"><span>9</span></div>

<div class="key" onclick="clearPin()"><span>⌫</span></div>
<div class="key" onclick="press(0)"><span>0</span></div>
<div class="key" onclick="checkPin()"><span>OK</span></div>

</div>

</div>

<!-- SLIDER -->

<div id="slider">

<div class="page" style="background-image:url('zfoto1.jpeg')">
<canvas id="rain"></canvas>
<div class="card" id="text1"></div>
</div>

<div class="page" style="background-image:url('zfoto2.jpeg')">
<div class="card" id="text2"></div>
</div>

<div class="page" style="background-image:url('zfoto3.jpeg')">

<div id="birthday">🎂 Happy Birthday Ikah ❤️</div>
<div class="card" id="text3"></div>

</div>

</div>

<script>

/* MUSIC START ON FIRST TOUCH */

let musicStarted=false

function startMusic(){

if(!musicStarted){

document.getElementById("music").play()
musicStarted=true

}

}

document.addEventListener("touchstart",startMusic,{once:true})
document.addEventListener("click",startMusic,{once:true})

/* TYPE TEXT */

function typeText(id,text){

let el=document.getElementById(id)
el.innerHTML=""

let i=0

function typing(){

if(i<text.length){

el.innerHTML+=text.charAt(i)
i++

setTimeout(typing,40)

}

}

typing()

}

/* PIN */

let pin=""
const correct="160725"

function press(n){

startMusic()

pin+=n
update()

}

function clearPin(){

pin=pin.slice(0,-1)
update()

}

function update(){

document.getElementById("display").innerText="*".repeat(pin.length)

}

function checkPin(){

if(pin===correct){

document.getElementById("pinPage").style.display="none"

typeText("text1","Bahkan saat hidup terasa seperti badai, kamu selalu ada.")

startStorm(350)

}else{

alert("Masih ingat tanggal pertama kita bertemu? ❤️")

pin=""
update()

}

}

/* SLIDE */

let page=0
let startX=0

document.addEventListener("touchstart",e=>{

startX=e.touches[0].clientX

})

document.addEventListener("touchend",e=>{

let endX=e.changedTouches[0].clientX

if(startX-endX>50){
if(page<2){page++;slide()}
}

if(endX-startX>50){
if(page>0){page--;slide()}
}

})

function slide(){

document.getElementById("slider").style.transform=
"translateX(-"+page*100+"vw)"

if(page==1){

typeText("text2","Semua terasa lebih tenang sejak ada kamu.")

startStorm(120)

}

if(page==2){

typeText("text3","Terima kasih sudah hadir dalam hidupku.")

document.getElementById("birthday").style.opacity=1

stopRain()
startConfetti()

}

}

/* CONFETTI */

function startConfetti(){

setInterval(()=>{

confetti({
particleCount:80,
spread:60,
origin:{x:Math.random(),y:0},
colors:["#ff4d6d","#ffd166","#06d6a0","#118ab2","#9b5de5","#f15bb5"]
})

},250)

}

/* RAIN */

let drops=[]
let ctx
let canvas
let rainInterval

function startStorm(intensity){

canvas=document.getElementById("rain")
ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

drops=[]

for(let i=0;i<intensity;i++){

drops.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
speed:5,
len:15
})

}

clearInterval(rainInterval)

rainInterval=setInterval(drawRain,30)

}

function drawRain(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.strokeStyle="rgba(255,255,255,0.8)"

ctx.beginPath()

for(let d of drops){

ctx.moveTo(d.x,d.y)

ctx.lineTo(d.x,d.y+d.len)

d.y+=d.speed

if(d.y>canvas.height){

d.y=-20

}

}

ctx.stroke()

}

function stopRain(){

clearInterval(rainInterval)

}

/* STARS */

for(let i=0;i<60;i++){

let s=document.createElement("div")

s.className="star"

s.style.left=Math.random()*100+"vw"

s.style.top=Math.random()*100+"vh"

document.getElementById("stars").appendChild(s)

}

/* FALL HEART */

for(let i=0;i<15;i++){

let h=document.createElement("div")

h.className="fallHeart"

h.innerHTML="❤"

h.style.left=Math.random()*100+"vw"

h.style.animationDuration=6+Math.random()*6+"s"

document.getElementById("fallHearts").appendChild(h)

}

</script>

</body>
</html>
