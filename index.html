<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Ikah ❤️</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
margin:0;
overflow:hidden;
font-family:sans-serif;
color:white;
background:black;
}

/* HEART LAYER */

#heartLayer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:999999;
}

.heart{
position:absolute;
font-size:22px;
animation:heartFly 1.4s forwards;
}

@keyframes heartFly{
0%{transform:translateY(0) scale(1);opacity:1;}
100%{transform:translateY(-160px) scale(1.6);opacity:0;}
}

/* PIN PAGE */

#pinPage{
position:fixed;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:10;
}

.pinBG{
position:absolute;
width:100%;
height:100%;
display:grid;
grid-template-columns:1fr 1fr 1fr;
}

.pinBG img{
width:100%;
height:100%;
object-fit:cover;
}

.pinCard{
position:relative;
background:rgba(0,0,0,0.5);
padding:25px;
border-radius:20px;
backdrop-filter:blur(10px);
text-align:center;
margin-bottom:20px;
}

.pinDisplay{
font-size:32px;
letter-spacing:10px;
}

/* KEYPAD */

.keypad{
display:grid;
grid-template-columns:repeat(3,85px);
gap:18px;
z-index:2;
}

.key{
height:75px;
width:75px;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
color:white;
background:rgba(255,255,255,0.15);
border-radius:50%;
backdrop-filter:blur(10px);
box-shadow:
0 8px 18px rgba(0,0,0,0.5),
inset 0 0 12px rgba(255,255,255,0.4);
cursor:pointer;
}

/* SLIDER */

#slider{
position:absolute;
width:300%;
height:100vh;
display:flex;
transition:transform .9s cubic-bezier(.77,0,.18,1);
}

.page{
width:100vw;
height:100vh;
background-size:cover;
background-position:center;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:30px;
position:relative;
}

/* CHAT CARD */

.card{
background:rgba(0,0,0,0.55);
padding:25px;
border-radius:24px;
backdrop-filter:blur(8px);
max-width:520px;
width:90%;
display:flex;
flex-direction:column;
gap:10px;
font-size:17px;
line-height:1.6;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

/* CHAT BUBBLE */

.chat{
padding:12px 16px;
border-radius:18px;
max-width:85%;
animation:fadeUp .5s ease;
}

.left{
align-self:flex-start;
background:rgba(255,255,255,0.15);
}

.right{
align-self:flex-end;
background:rgba(255,105,180,0.35);
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* BIRTHDAY */

#birthday{
font-size:42px;
font-weight:bold;
text-shadow:
0 0 20px #ff4da6,
0 0 40px #ff4da6,
0 0 60px #ff4da6;
margin-bottom:20px;
opacity:0;
transition:opacity 2s;
text-align:center;
}

canvas{
position:absolute;
top:0;
left:0;
pointer-events:none;
}

</style>
</head>

<body>

<div id="heartLayer"></div>

<audio id="music" loop>
<source src="risk-it-all.mp3">
</audio>

<!-- PIN PAGE -->

<div id="pinPage">

<div class="pinBG">
<img src="zfoto1.jpeg">
<img src="zfoto2.jpeg">
<img src="zfoto3.jpeg">
</div>

<div class="pinCard">
<h2>🔐 Secret Code</h2>
<p>Clue: tanggal pertama kita bertemu ❤️</p>
<div id="display" class="pinDisplay">______</div>
</div>

<div class="keypad">

<div class="key" onclick="press(1)">1</div>
<div class="key" onclick="press(2)">2</div>
<div class="key" onclick="press(3)">3</div>

<div class="key" onclick="press(4)">4</div>
<div class="key" onclick="press(5)">5</div>
<div class="key" onclick="press(6)">6</div>

<div class="key" onclick="press(7)">7</div>
<div class="key" onclick="press(8)">8</div>
<div class="key" onclick="press(9)">9</div>

<div class="key" onclick="clearPin()">⌫</div>
<div class="key" onclick="press(0)">0</div>
<div class="key" onclick="checkPin()">OK</div>

</div>

</div>

<!-- SLIDER -->

<div id="slider">

<div class="page" style="background-image:url('zfoto1.jpeg')">

<canvas id="rain"></canvas>
<div class="card" id="text1"></div>

</div>

<div class="page" style="background-image:url('zfoto2.jpeg')">

<div class="card" id="text2"></div>

</div>

<div class="page" style="background-image:url('zfoto3.jpeg')">

<div id="birthday">🎂 Happy Birthday Ikah ❤️</div>
<div class="card" id="text3"></div>

</div>

</div>

<script>

/* MUSIC */

let musicStarted=false

function startMusic(){
if(!musicStarted){
document.getElementById("music").play()
musicStarted=true
}
}

document.addEventListener("pointerdown",startMusic,{once:true})

/* TYPE TEXT */

function typeText(id,text){

let el=document.getElementById(id)
el.innerHTML=""
let i=0

function typing(){
if(i<text.length){
el.innerHTML+=text.charAt(i)
i++
setTimeout(typing,18)
}
}

typing()

}

/* PIN */

let pin=""
const correct="160725"

function press(n){
startMusic()
pin+=n
update()
}

function clearPin(){
pin=pin.slice(0,-1)
update()
}

function update(){
document.getElementById("display").innerText="*".repeat(pin.length)
}

function checkPin(){

if(pin===correct){

document.getElementById("pinPage").style.display="none"

typeText("text1",
"<div class='chat left'>Yeayyyy... 😆</div>"+
"<div class='chat left'>Kalau kamu bisa buka PIN ini berarti kamu masih inget awal kita interaksi.</div>"+
"<div class='chat left'>Iseng mau throwback ke awal kita kenal.</div>"+
"<div class='chat left'>Karena kemarin kamu bilang seneng bisa ketemu aku.</div>"+
"<div class='chat right'>Jadi aku mau tes kamu 😋</div>"+
"<div class='chat right'>Kalau bener masih inget... harusnya kamu bisa buka PIN ini 😗❤️</div>"
)

startStorm(320)

}else{

alert("Masih ingat tanggal pertama kita bertemu? ❤️")

pin=""
update()

}

}

/* SLIDE */

let page=0
let startX=0

document.addEventListener("pointerdown",e=>{
startX=e.clientX
})

document.addEventListener("pointerup",e=>{

let endX=e.clientX

if(startX-endX>50){
if(page<2){page++;slide()}
}

if(endX-startX>50){
if(page>0){page--;slide()}
}

})

function slide(){

document.getElementById("slider").style.transform=
"translateX(-"+page*100+"vw)"

if(page==1){

typeText("text2",
"<div class='chat left'>Tbh...</div>"+
"<div class='chat left'>Walaupun aku yakin kita bakal bertahan sampai sekarang.</div>"+
"<div class='chat left'>Aku tetap ngerasa amaze kita masih bisa sejauh ini 🥹</div>"+
"<div class='chat left'>Glad to meet you and finally have you bee.</div>"+
"<div class='chat right'>Sekarang kita sudah sampai di hari bahagia kita 🎉</div>"+
"<div class='chat right'>Yaitu ulang tahun kita.</div>"+
"<div class='chat right'>Semoga kita bisa naik ke jenjang kebahagiaan berikutnya.</div>"+
"<div class='chat right'>Sampai ke hari bahagia lain yang kita tunggu juga sayangg 😝🥰😚</div>"
)

startStorm(150)

}

if(page==2){

typeText("text3",
"<div class='chat left'>Sekarang kita rayain hari bahagia untuk kamu duluu.</div>"+
"<div class='chat left'>Karena kamu baru saja menginjak umur 24 tahunnn!!! 🥳🥳</div>"+
"<div class='chat right'><b>Happy Birthday sayanggg ❤️</b></div>"+
"<div class='chat left'>Semoga kamu selalu diberikan kesehatan.</div>"+
"<div class='chat left'>Dan keselamatan di setiap langkah kamu.</div>"+
"<div class='chat left'>Semoga rezekimu selalu berlimpah.</div>"+
"<div class='chat left'>Dan hidupmu penuh keberkahan.</div>"+
"<div class='chat right'>Dan kamu selalu sayang sama aku walaupun aku sering ngambek 🤭</div>"+
"<div class='chat right'>(walaupun kadang kamu juga yang nyebelin 😤😂)</div>"+
"<div class='chat left'>Untuk kita berdua...</div>"+
"<div class='chat left'>Semoga kita selalu saling mengerti.</div>"+
"<div class='chat left'>Dan memberikan effort terbaik untuk hubungan kita.</div>"+
"<div class='chat right'><b>Supaya bisa longlasttt 🥰❤️✨</b></div>"
)

document.getElementById("birthday").style.opacity=1

stopRain()
startConfetti()

}

}

/* CONFETTI */

function startConfetti(){

setInterval(()=>{

confetti({
particleCount:80,
spread:60,
origin:{x:Math.random(),y:0},
colors:["#ff4d6d","#ffd166","#06d6a0","#118ab2","#9b5de5","#f15bb5"]
})

},260)

}

/* RAIN */

let drops=[]
let ctx
let canvas
let rainInterval

function startStorm(intensity){

canvas=document.getElementById("rain")
ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

drops=[]

for(let i=0;i<intensity;i++){

drops.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
speed:5,
len:15
})

}

clearInterval(rainInterval)

rainInterval=setInterval(drawRain,30)

}

function drawRain(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.strokeStyle="rgba(255,255,255,0.8)"

ctx.beginPath()

for(let d of drops){

ctx.moveTo(d.x,d.y)
ctx.lineTo(d.x,d.y+d.len)

d.y+=d.speed

if(d.y>canvas.height){
d.y=-20
}

}

ctx.stroke()

}

function stopRain(){
clearInterval(rainInterval)
}

</script>

</body>
</html>
