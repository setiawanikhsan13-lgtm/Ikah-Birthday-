<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For You ❤️</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
margin:0;
overflow:hidden;
font-family:sans-serif;
color:white;
}

/* PIN PAGE */

#pinPage{
position:fixed;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:10;
}

/* COLLAGE BACKGROUND */

.pinBG{
position:absolute;
width:100%;
height:100%;
display:grid;
grid-template-columns:1fr 1fr 1fr;
}

.pinBG img{
width:100%;
height:100%;
object-fit:cover;
}

/* GLASS CARD */

.pinCard{
position:relative;
background:rgba(0,0,0,0.55);
padding:25px;
border-radius:20px;
backdrop-filter:blur(10px);
text-align:center;
margin-bottom:20px;
}

.pinDisplay{
font-size:32px;
letter-spacing:10px;
}

/* KEYPAD */

.keypad{
display:grid;
grid-template-columns:repeat(3,85px);
gap:16px;
z-index:2;
}

.key{
background:white;
color:#ff4da6;
border-radius:18px;
height:75px;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:bold;
box-shadow:0 8px 18px rgba(0,0,0,0.5);
}

/* HEART */

.heart{
position:absolute;
font-size:22px;
animation:heartFly 2s forwards;
pointer-events:none;
}

@keyframes heartFly{
0%{transform:translateY(0) scale(1);opacity:1;}
100%{transform:translateY(-220px) scale(2);opacity:0;}
}

/* SLIDER */

#slider{
position:absolute;
width:300%;
height:100vh;
display:flex;
transition:transform 0.9s cubic-bezier(.77,0,.18,1);
}

.page{
width:100vw;
height:100vh;
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
padding:40px;
position:relative;
}

.card{
background:rgba(0,0,0,0.45);
padding:30px;
border-radius:20px;
backdrop-filter:blur(6px);
max-width:500px;
text-align:center;
font-size:20px;
}

/* LIGHTNING */

.flash{
position:absolute;
width:100%;
height:100%;
background:white;
opacity:0;
pointer-events:none;
transition:opacity .2s;
}

canvas{
position:absolute;
top:0;
left:0;
pointer-events:none;
}

</style>
</head>

<body>

<!-- PIN -->

<div id="pinPage">

<div class="pinBG">
<img src="zfoto1.jpeg">
<img src="zfoto2.jpeg">
<img src="zfoto3.jpeg">
</div>

<div class="pinCard">
<h2>🔐 Secret Code</h2>
<p>Clue: tanggal pertama kita bertemu ❤️</p>
<div id="display" class="pinDisplay">______</div>
</div>

<div class="keypad">

<div class="key" onclick="press(1)">1</div>
<div class="key" onclick="press(2)">2</div>
<div class="key" onclick="press(3)">3</div>

<div class="key" onclick="press(4)">4</div>
<div class="key" onclick="press(5)">5</div>
<div class="key" onclick="press(6)">6</div>

<div class="key" onclick="press(7)">7</div>
<div class="key" onclick="press(8)">8</div>
<div class="key" onclick="press(9)">9</div>

<div class="key" onclick="clearPin()">⌫</div>
<div class="key" onclick="press(0)">0</div>
<div class="key" onclick="checkPin()">OK</div>

</div>

</div>

<!-- SLIDER -->

<div id="slider">

<div class="page" style="background-image:url('zfoto1.jpeg')">

<canvas id="rain"></canvas>
<div class="flash" id="flash"></div>

<div class="card">
Bahkan saat hidup terasa seperti badai,
kamu selalu ada di sana.
</div>

</div>

<div class="page" style="background-image:url('zfoto2.jpeg')">

<div class="card">
Perlahan semuanya menjadi lebih tenang.
Karena ada kamu di setiap langkahku.
</div>

</div>

<div class="page" style="background-image:url('zfoto3.jpeg')">

<div class="card">
Terima kasih sudah hadir dalam hidupku.
Semoga kita selalu bersama ❤️
</div>

</div>

</div>

<audio id="music" loop playsinline>
<source src="risk-it-all.mp3">
</audio>

<script>

/* PIN */

let pin=""
const correct="160725"
let musicStarted=false

function press(n){

pin+=n
update()

if(!musicStarted){
document.getElementById("music").play()
musicStarted=true
}

}

function clearPin(){
pin=pin.slice(0,-1)
update()
}

function update(){
document.getElementById("display").innerText="*".repeat(pin.length)
}

function checkPin(){

if(pin===correct){

document.getElementById("pinPage").style.display="none"
startStorm(400,true)

}else{

alert("Masih ingat tanggal pertama kita bertemu? ❤️")
pin=""
update()

}

}

/* LOVE BURST MOBILE */

function heartBurst(x,y){

for(let i=0;i<25;i++){

let heart=document.createElement("div")

heart.className="heart"
heart.innerHTML="❤️"

heart.style.left=(x+(Math.random()*200-100))+"px"
heart.style.top=(y+(Math.random()*100-50))+"px"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),2000)

}

}

/* TAP ANYWHERE */

document.addEventListener("touchstart",e=>{

let x=e.touches[0].clientX
let y=e.touches[0].clientY

heartBurst(x,y)

})

/* SWIPE */

let page=0
let startX=0

function slide(){

document.getElementById("slider").style.transform=
"translateX(-"+page*100+"vw)"

if(page==1){
startStorm(150,false)
}

if(page==2){
stopRain()
startConfetti()
}

}

document.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

document.addEventListener("touchend",e=>{

let endX=e.changedTouches[0].clientX

if(startX-endX>50){
if(page<2){page++;slide()}
}

if(endX-startX>50){
if(page>0){page--;slide()}
}

})

/* RAIN */

let drops=[]
let ctx
let canvas
let rainInterval
let lightningInterval

function startStorm(intensity,withLightning){

canvas=document.getElementById("rain")
ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

drops=[]

for(let i=0;i<intensity;i++){

drops.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
speed:5+Math.random()*5,
len:12+Math.random()*10
})

}

clearInterval(rainInterval)
rainInterval=setInterval(drawRain,30)

if(withLightning){
startLightning()
}else{
clearInterval(lightningInterval)
}

}

function drawRain(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.strokeStyle="rgba(255,255,255,0.8)"
ctx.lineWidth=1.2
ctx.beginPath()

for(let d of drops){

ctx.moveTo(d.x,d.y)
ctx.lineTo(d.x,d.y+d.len)

d.y+=d.speed

if(d.y>canvas.height){
d.y=-20
d.x=Math.random()*canvas.width
}

}

ctx.stroke()

}

function stopRain(){
clearInterval(rainInterval)
drops=[]
}

/* LIGHTNING */

function startLightning(){

let flash=document.getElementById("flash")

clearInterval(lightningInterval)

lightningInterval=setInterval(()=>{

flash.style.opacity=0.9
setTimeout(()=>flash.style.opacity=0,120)

},6000)

}

/* CONFETTI */

function startConfetti(){

setInterval(()=>{

confetti({
particleCount:60,
spread:40,
startVelocity:30,
gravity:1.1,
ticks:300,
scalar:1.4,
origin:{x:Math.random(),y:0},
colors:["#ff4da6","#ffffff","#ff1a75"]
})

},250)

}

</script>

</body>
</html>
