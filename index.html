<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Ikah ❤️</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial,Helvetica,sans-serif;
color:white;
background:black;
}

/* HEART */

#heartLayer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:9999;
}

.heart{
position:absolute;
font-size:22px;
animation:heartFly 1.5s forwards;
}

@keyframes heartFly{
0%{transform:translateY(0) scale(1);opacity:1;}
100%{transform:translateY(-150px) scale(1.7);opacity:0;}
}

/* PIN PAGE */

#pinPage{
position:fixed;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:10;
}

.pinBG{
position:absolute;
width:100%;
height:100%;
display:grid;
grid-template-columns:1fr 1fr 1fr;
}

.pinBG img{
width:100%;
height:100%;
object-fit:cover;
}

.pinCard{
position:relative;
background:rgba(0,0,0,0.55);
padding:25px;
border-radius:20px;
text-align:center;
backdrop-filter:blur(10px);
max-width:90vw;
}

.pinDisplay{
font-size:28px;
letter-spacing:10px;
margin-top:10px;
}

/* KEYPAD */

.keypad{
display:grid;
grid-template-columns:repeat(3,70px);
gap:15px;
margin-top:20px;
}

.key{
height:65px;
width:65px;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
background:rgba(255,255,255,0.15);
border-radius:50%;
}

/* SLIDER */

#slider{
position:absolute;
width:300%;
height:100vh;
display:flex;
transition:transform .8s ease;
}

.page{
width:100vw;
height:100vh;
background-size:cover;
background-position:center;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
position:relative;
overflow:hidden;
}

/* TITLE */

.pageTitle{
position:absolute;
top:70px;
left:50%;
transform:translateX(-50%);
font-size:32px;
text-align:center;
text-shadow:
0 0 20px #ff4da6,
0 0 40px #ff4da6,
0 0 60px #ff4da6;
}

/* CARD */

.card{
margin-top:80px;
background:rgba(0,0,0,0.55);
padding:20px;
border-radius:20px;
max-width:92vw;
width:92vw;
display:flex;
flex-direction:column;
gap:10px;
line-height:1.6;
overflow:hidden;
}

/* CHAT */

.chat{
padding:10px 15px;
border-radius:16px;
max-width:85%;
background:rgba(255,255,255,0.15);
align-self:flex-start;
animation:fadeUp .5s ease;
}

.typing{
font-style:italic;
opacity:.8;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

/* NAV BUTTON */

.nav{
position:absolute;
bottom:25px;
font-size:16px;
background:rgba(0,0,0,0.55);
padding:8px 14px;
border-radius:20px;
cursor:pointer;
}

.leftNav{
left:20px;
}

.rightNav{
right:20px;
}

/* PAGE 3 */

#birthday{
font-size:38px;
font-weight:bold;
margin-bottom:20px;
opacity:0;
transition:opacity 2s;
text-align:center;

text-shadow:
0 0 20px #ff4da6,
0 0 40px #ff4da6,
0 0 60px #ff4da6;
}

#letter{
max-width:92vw;
width:92vw;
line-height:1.8;
font-size:16px;
background:rgba(0,0,0,0.55);
padding:20px;
border-radius:20px;
}

</style>
</head>

<body>

<div id="heartLayer"></div>

<audio id="music" loop preload="auto">
<source src="risk-it-all.mp3">
</audio>

<!-- PIN PAGE -->

<div id="pinPage">

<div class="pinBG">
<img src="zfoto1.jpeg">
<img src="zfoto2.jpeg">
<img src="zfoto3.jpeg">
</div>

<div class="pinCard">

<h2>🔐 Secret Code</h2>

<p>Hari dimana "hai" sederhana berubah jadi cerita panjang kita 🤍</p>

<div id="display" class="pinDisplay">______</div>

</div>

<div class="keypad">

<div class="key" onclick="press(1)">1</div>
<div class="key" onclick="press(2)">2</div>
<div class="key" onclick="press(3)">3</div>

<div class="key" onclick="press(4)">4</div>
<div class="key" onclick="press(5)">5</div>
<div class="key" onclick="press(6)">6</div>

<div class="key" onclick="press(7)">7</div>
<div class="key" onclick="press(8)">8</div>
<div class="key" onclick="press(9)">9</div>

<div class="key" onclick="clearPin()">⌫</div>
<div class="key" onclick="press(0)">0</div>
<div class="key" onclick="checkPin()">OK</div>

</div>

</div>

<!-- SLIDER -->

<div id="slider">

<!-- PAGE 1 -->

<div class="page" style="background-image:url('zfoto1.jpeg')">

<div class="pageTitle">Dimana semua ini dimulai 🐻‍❄️</div>

<div class="card" id="text1"></div>

<div class="nav rightNav" id="next1" style="display:none">Slide Next ➜</div>

</div>

<!-- PAGE 2 -->

<div class="page" style="background-image:url('zfoto2.jpeg')">

<div class="pageTitle">Tentang kita yang belajar memahami 🤍</div>

<div class="card" id="text2"></div>

<div class="nav leftNav">⬅ Slide Back</div>
<div class="nav rightNav" id="next2" style="display:none">Slide Next ➜</div>

</div>

<!-- PAGE 3 -->

<div class="page" style="background-image:url('zfoto3.jpeg')">

<div id="birthday">🎂 Happy Birthday Ikah ❤️</div>

<div id="letter"></div>

<div class="nav leftNav">⬅ Slide Back</div>

</div>

</div>

<script>

/* HEART */

document.addEventListener("pointerdown",e=>{
let heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="❤️"
heart.style.left=e.clientX+"px"
heart.style.top=e.clientY+"px"
document.getElementById("heartLayer").appendChild(heart)
setTimeout(()=>heart.remove(),1500)
})

/* MUSIC */

let musicStarted=false

function startMusic(){
if(!musicStarted){
document.getElementById("music").play().catch(()=>{})
musicStarted=true
}
}

document.addEventListener("pointerdown",startMusic,{once:true})

/* BUBBLE CHAT */

function showBubbles(id,text,done){

let el=document.getElementById(id)

if(el.dataset.done) return

let bubbles=text.match(/<div class='chat.*?<\/div>/g)

let i=0

function next(){

if(i<bubbles.length){

let typing=document.createElement("div")
typing.className="chat typing"
typing.innerText="... sedang mengetik"

el.appendChild(typing)

setTimeout(()=>{

typing.remove()
el.innerHTML+=bubbles[i]

i++

setTimeout(next,1200)

},900)

}else{

el.dataset.done=true

if(done) done()

}

}

next()

}

/* TYPE LETTER */

function typeParagraph(text){

let el=document.getElementById("letter")
let i=0

function typing(){
if(i<text.length){
el.innerHTML+=text.charAt(i)
i++
setTimeout(typing,28)
}
}

typing()

}

/* PIN */

let pin=""
const correct="160725"

function press(n){
pin+=n
update()
}

function clearPin(){
pin=pin.slice(0,-1)
update()
}

function update(){
document.getElementById("display").innerText="*".repeat(pin.length)
}

function checkPin(){

if(pin===correct){

document.getElementById("pinPage").style.display="none"

showBubbles("text1",

"<div class='chat'>Yeayyyy...</div>"+
"<div class='chat'>kalo kamu bisa buka pinnya berarti kamu masih inget awal kita interaksii😆</div>"+
"<div class='chat'>Iseng mau throwback awal kita interaksi..</div>"+
"<div class='chat'>Karna kamu kemaren ngucapin seneng bisa ketemu aku</div>"+
"<div class='chat'>Jadi mau tes kamu hihihi</div>"+

"<div class='chat'>kalo bener harus bisa buka pin ini😋😗</div>"

,()=>{

document.getElementById("next1").style.display="block"

})

}else{

alert("Masih ingat awal cerita kita? 🤍")

pin=""
update()

}

}

/* SLIDE */

let page=0
let startX=0

document.addEventListener("pointerdown",e=>{
startX=e.clientX
})

document.addEventListener("pointerup",e=>{

let endX=e.clientX

if(startX-endX>50){
if(page<2){page++;slide()}
}

if(endX-startX>50){
if(page>0){page--;slide()}
}

})

function slide(){

document.getElementById("slider").style.transform="translateX(-"+page*100+"vw)"

if(page==1){

showBubbles("text2",

"<div class='chat'>Tbh..</div>"+
"<div class='chat'>Walaupun aku yakin kita bakal bertahan sampe sekarang</div>"+
"<div class='chat'>Aku tetep ngerasa amaze kita masih bertahan🥹</div>"+
"<div class='chat'>Glad to meet you and finally have you bee..</div>"+
"<div class='chat'>Sekarang kita udah sampe di hari bahagia yaitu ulang tahun kita</div>"+
"<div class='chat'>Semoga bisa naik jenjang kebahagiaan kita sampe ketemu hari bahagia berikutnya yang kita nantiin jugaa sayangg😝🥰😚</div>"

,()=>{

document.getElementById("next2").style.display="block"

})

}

if(page==2){

document.getElementById("birthday").style.opacity=1

typeParagraph(

"Untuk sekarang kita rayain hari bahagia untuk kamu duluu yang baru aja menginjak umur 24 tahunnn!!!🥳🥳 Happy Birthday sayanggg.. semoga diumur yang sekarang ini kamu selalu diberikan kesehatan serta keselamatan di setiap langkah kamuu..."

)

startConfetti()

}

}

/* CONFETTI */

function startConfetti(){

setInterval(()=>{

confetti({
particleCount:70,
spread:70,
origin:{x:Math.random(),y:0}
})

},400)

}

</script>

</body>
</html>
