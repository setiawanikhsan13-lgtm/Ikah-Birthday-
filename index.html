<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Ikah ❤️</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial,Helvetica,sans-serif;
color:white;
background:black;
}

/* HEART LAYER */

#heartLayer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:9999;
}

.heart{
position:absolute;
font-size:22px;
animation:heartFly 1.5s forwards;
}

@keyframes heartFly{
0%{transform:translateY(0) scale(1);opacity:1;}
100%{transform:translateY(-150px) scale(1.7);opacity:0;}
}

/* PIN PAGE */

#pinPage{
position:fixed;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:10;
}

.pinBG{
position:absolute;
width:100%;
height:100%;
display:grid;
grid-template-columns:1fr 1fr 1fr;
}

.pinBG img{
width:100%;
height:100%;
object-fit:cover;
}

.pinCard{
position:relative;
background:rgba(0,0,0,0.55);
padding:25px;
border-radius:20px;
text-align:center;
backdrop-filter:blur(10px);
}

.pinDisplay{
font-size:30px;
letter-spacing:10px;
margin-top:10px;
}

/* KEYPAD */

.keypad{
display:grid;
grid-template-columns:repeat(3,75px);
gap:15px;
margin-top:20px;
z-index:2;
}

.key{
height:70px;
width:70px;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
background:rgba(255,255,255,0.15);
border-radius:50%;
cursor:pointer;
}

/* SLIDER */

#slider{
position:absolute;
width:300%;
height:100vh;
display:flex;
transition:transform .8s ease;
}

.page{
width:100vw;
height:100vh;
background-size:cover;
background-position:center;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:20px;
position:relative;
}

/* TITLE */

.pageTitle{
position:absolute;
top:40px;
left:50%;
transform:translateX(-50%);
font-size:clamp(20px,3vw,30px);
text-align:center;
background:rgba(0,0,0,0.55);
padding:12px 20px;
border-radius:20px;
}

/* CARD */

.card{
background:rgba(0,0,0,0.55);
padding:20px;
border-radius:20px;
max-width:520px;
width:90%;
display:flex;
flex-direction:column;
gap:10px;
font-size:clamp(15px,2vw,18px);
line-height:1.6;
}

/* CHAT */

.chat{
padding:10px 15px;
border-radius:16px;
max-width:85%;
background:rgba(255,255,255,0.15);
animation:fadeUp .5s ease;
align-self:flex-start;
}

.typing{
font-style:italic;
opacity:.8;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

/* PAGE 3 */

#birthday{
font-size:clamp(28px,5vw,44px);
font-weight:bold;
text-shadow:
0 0 20px #ff4da6,
0 0 40px #ff4da6,
0 0 60px #ff4da6;
margin-bottom:20px;
opacity:0;
transition:opacity 2s;
text-align:center;
}

#letter{
max-width:520px;
width:90%;
line-height:1.8;
font-size:clamp(15px,2vw,18px);
background:rgba(0,0,0,0.55);
padding:20px;
border-radius:20px;
}

/* MOBILE */

@media(max-width:600px){

.pinBG{
grid-template-columns:1fr;
}

.pinBG img:nth-child(2),
.pinBG img:nth-child(3){
display:none;
}

}

</style>
</head>

<body>

<div id="heartLayer"></div>

<audio id="music" loop>
<source src="risk-it-all.mp3">
</audio>

<!-- PIN PAGE -->

<div id="pinPage">

<div class="pinBG">
<img src="zfoto1.jpeg">
<img src="zfoto2.jpeg">
<img src="zfoto3.jpeg">
</div>

<div class="pinCard">

<h2>🔐 Secret Code</h2>
<p>Clue: tanggal pertama kita bertemu ❤️</p>

<div id="display" class="pinDisplay">______</div>

</div>

<div class="keypad">

<div class="key" onclick="press(1)">1</div>
<div class="key" onclick="press(2)">2</div>
<div class="key" onclick="press(3)">3</div>

<div class="key" onclick="press(4)">4</div>
<div class="key" onclick="press(5)">5</div>
<div class="key" onclick="press(6)">6</div>

<div class="key" onclick="press(7)">7</div>
<div class="key" onclick="press(8)">8</div>
<div class="key" onclick="press(9)">9</div>

<div class="key" onclick="clearPin()">⌫</div>
<div class="key" onclick="press(0)">0</div>
<div class="key" onclick="checkPin()">OK</div>

</div>

</div>

<!-- SLIDER -->

<div id="slider">

<div class="page" style="background-image:url('zfoto1.jpeg')">

<div class="pageTitle">
❤️ Dimana semua ini dimulai ❤️
</div>

<canvas id="rain"></canvas>

<div class="card" id="text1"></div>

</div>

<div class="page" style="background-image:url('zfoto2.jpeg')">

<div class="pageTitle">
❤️ Tentang kita yang belajar memahami ❤️
</div>

<div class="card" id="text2"></div>

</div>

<div class="page" style="background-image:url('zfoto3.jpeg')">

<div id="birthday">🎂 Happy Birthday Ikah ❤️</div>

<div id="letter"></div>

</div>

</div>

<script>

/* HEART EFFECT */

function createHeart(x,y){

let heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="❤️"

heart.style.left=x+"px"
heart.style.top=y+"px"

document.getElementById("heartLayer").appendChild(heart)

setTimeout(()=>heart.remove(),1500)

}

document.addEventListener("pointerdown",e=>{
createHeart(e.clientX,e.clientY)
})

/* MUSIC */

let musicStarted=false

function startMusic(){
if(!musicStarted){
document.getElementById("music").play()
musicStarted=true
}
}

document.addEventListener("pointerdown",startMusic,{once:true})

/* CHAT BUBBLES WITH TYPING */

function showBubbles(id,text){

let el=document.getElementById(id)
el.innerHTML=""

let bubbles=text.match(/<div class='chat.*?<\/div>/g)

let i=0

function next(){

if(i<bubbles.length){

let typing=document.createElement("div")
typing.className="chat typing"
typing.innerText="... sedang mengetik"

el.appendChild(typing)

let bubbleHTML=bubbles[i]

let plain=bubbleHTML.replace(/<[^>]*>/g,"")

let words=plain.split(/\s+/).length

let delay=Math.max(1200,words*320)

setTimeout(()=>{

typing.remove()

el.innerHTML+=bubbleHTML

i++

setTimeout(next,delay)

},1000)

}

}

next()

}

/* TYPE LETTER */

function typeLetter(text){

let el=document.getElementById("letter")
let i=0

function type(){

if(i<text.length){

if(text.charAt(i)=="\n"){
el.innerHTML+="<br><br>"
}else{
el.innerHTML+=text.charAt(i)
}

i++

setTimeout(type,35)

}

}

type()

}

/* PIN */

let pin=""
const correct="160725"

function press(n){
startMusic()
pin+=n
update()
}

function clearPin(){
pin=pin.slice(0,-1)
update()
}

function update(){
document.getElementById("display").innerText="*".repeat(pin.length)
}

function checkPin(){

if(pin===correct){

document.getElementById("pinPage").style.display="none"

showBubbles("text1",
"<div class='chat'>Yeayyyy... 😆</div>"+
"<div class='chat'>Kalau kamu bisa buka PIN ini berarti kamu masih inget awal kita interaksi.</div>"+
"<div class='chat'>Iseng mau throwback ke awal kita kenal.</div>"+
"<div class='chat'>Karena kemarin kamu bilang seneng bisa ketemu aku.</div>"+
"<div class='chat'>Jadi aku mau tes kamu 😋</div>"+
"<div class='chat'>Kalau bener masih inget... harusnya kamu bisa buka PIN ini 😗❤️</div>"
)

startStorm(300)

}else{

alert("Masih ingat tanggal pertama kita bertemu? ❤️")

pin=""
update()

}

}

/* SLIDE */

let page=0
let startX=0

document.addEventListener("pointerdown",e=>{
startX=e.clientX
})

document.addEventListener("pointerup",e=>{

let endX=e.clientX

if(startX-endX>50){
if(page<2){page++;slide()}
}

if(endX-startX>50){
if(page>0){page--;slide()}
}

})

function slide(){

document.getElementById("slider").style.transform=
"translateX(-"+page*100+"vw)"

if(page==1){

showBubbles("text2",
"<div class='chat'>Tbh...</div>"+
"<div class='chat'>Walaupun aku yakin kita bakal bertahan sampai sekarang.</div>"+
"<div class='chat'>Aku tetap ngerasa amaze kita masih bisa sejauh ini 🥹</div>"+
"<div class='chat'>Glad to meet you and finally have you.</div>"+
"<div class='chat'>Semoga kita terus belajar memahami satu sama lain.</div>"
)

startStorm(150)

}

if(page==2){

document.getElementById("birthday").style.opacity=1

typeLetter(
"Selamat ulang tahun sayang.\n\n"+
"Semoga kamu selalu diberikan kesehatan, kebahagiaan, dan keberkahan.\n\n"+
"Aku bersyukur bisa mengenal kamu dan menjalani semua proses ini bersama kamu.\n\n"+
"Semoga kita selalu saling mengerti, saling menjaga, dan berjalan bersama sampai ke banyak hari bahagia lainnya.\n\n"+
"Happy Birthday Ikah ❤️"
)

stopRain()
startConfetti()

}

}

/* CONFETTI */

function startConfetti(){

setInterval(()=>{

confetti({
particleCount:70,
spread:70,
origin:{x:Math.random(),y:0}
})

},300)

}

/* RAIN */

let drops=[]
let ctx
let canvas
let rainInterval

function startStorm(intensity){

canvas=document.getElementById("rain")
ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

drops=[]

for(let i=0;i<intensity;i++){

drops.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
speed:5,
len:15
})

}

clearInterval(rainInterval)

rainInterval=setInterval(drawRain,30)

}

function drawRain(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.strokeStyle="rgba(255,255,255,0.8)"

ctx.beginPath()

for(let d of drops){

ctx.moveTo(d.x,d.y)
ctx.lineTo(d.x,d.y+d.len)

d.y+=d.speed

if(d.y>canvas.height){
d.y=-20
}

}

ctx.stroke()

}

function stopRain(){
clearInterval(rainInterval)
}

</script>

</body>
</html>
